name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: bash tests/test-all.sh

      - name: Shellcheck
        run: |
          brew install shellcheck
          shellcheck -x bin/claude-notifier bin/claude-notifier-daemon lib/*.sh install.sh uninstall.sh
