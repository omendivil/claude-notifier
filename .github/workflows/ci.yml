name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: bash tests/test-all.sh

      - name: Shellcheck
        run: |
          brew install shellcheck
          shellcheck bin/claude-notifier lib/*.sh
