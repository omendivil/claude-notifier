# Claude Notifier Configuration
# Docs: https://github.com/<user>/claude-notifier

# ── Notification Modes ──────────────────────────
# Enable/disable each mode independently (true/false)
NOTIFY_BLINK=true
NOTIFY_COLOR=false
NOTIFY_DESKTOP=false

# ── Color Mode Settings ─────────────────────────
# Only used when NOTIFY_COLOR=true
# Values must be hex colors (#rrggbb)
COLOR_PERMISSION="#ff9500"
COLOR_DONE="#34c759"
COLOR_WORKING="#007aff"

# ── Blink Timing ────────────────────────────────
# Duration in seconds (fractional allowed)
BLINK_FAST=0.1
BLINK_SLOW=0.3

# ── Debounce ────────────────────────────────────
# Minimum seconds between "working" notifications
DEBOUNCE_WORKING=3
