# Claude Notifier Configuration
# Docs: https://github.com/<user>/claude-notifier

# ── Notification Modes ──────────────────────────
# Enable/disable each mode independently (true/false)
NOTIFY_BLINK=true
NOTIFY_COLOR=true
NOTIFY_DESKTOP=false

# ── Color Mode Settings ─────────────────────────
# Bold neon colors that pop against any theme
# Values must be hex colors (#rrggbb)
COLOR_PERMISSION="#ff003c"
COLOR_DONE="#00ffd5"
COLOR_WORKING="#b026ff"

# ── Blink Timing ────────────────────────────────
# Duration in seconds (fractional allowed)
BLINK_FAST=0.1
BLINK_SLOW=0.3

# ── Debounce ────────────────────────────────────
# Minimum seconds between "working" notifications
DEBOUNCE_WORKING=3

# ── State Colors (additional) ─────────────────
COLOR_RESEARCHING="#007aff"
COLOR_ERROR="#ff6b00"

# ── Daemon Settings ───────────────────────────
# Seconds before done/waiting → idle (daemon checks every 10s)
IDLE_TIMEOUT=300
# Seconds before alerting on watched commands
STUCK_TIMEOUT=180
# Pipe-delimited patterns for commands that can hang
STUCK_COMMANDS="install|init|create-|run dev|run start|serve"
